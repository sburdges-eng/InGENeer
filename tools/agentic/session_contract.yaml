# Machine-checked session contract (Phase 0). See docs/superpowers/plans/2026-06-11-agentic-work-memory-hardening.md §1.3

preconditions:
  git_clean: true
  dirty_scope: []  # paths allowed dirty when git_clean is relaxed via --dirty-scope
  must_read:
    - docs/handoff.md
    - docs/architecture/CONSTRAINTS.md
    - docs/superpowers/plans/2026-06-11-agentic-work-memory-hardening.md

invariants:
  - cmd: "ruff check orchestrator/src orchestrator/tests"
  - cmd: "cd orchestrator && python -m pytest -q --ignore=tests/test_intent_generator.py -m 'not integration'"
  - cmd: "ctest --preset asan-ubsan"
    when_path_exists: libs
  - contract_tests_previously_passing: must_still_pass
  - forbidden_diffs_mechanical:
      - pattern: "prev_hash"
        description: hash-chain field removal or weakening
      - pattern: "AuditLogger"
        description: audit emit / logger removal
      - pattern: "verify_chain"
        description: chain verification removal
      - pattern: "Commit()"
        description: CAD transaction commit guard removal
      - pattern: rollback
        description: rollback block removal
      - pattern: fingerprint
        description: fingerprint / verification gate removal
      - pattern: sanitizer
        description: sanitizer CI config removal
      - pattern: asan-ubsan
        description: ASan/UBSan preset removal

postconditions:
  - file_updated: docs/handoff.md
  - audit_event_appended: false  # agent-work chain wiring lands in Phase 3

on_violation: revert branch, log drift report under docs/drift/, request human review
